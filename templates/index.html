<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula AI - Ultimate Interview Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #a29bfe;
            --bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 50px 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(142, 68, 173, 0.2);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 3rem;
        }

        .feature-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        .feature-box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .feature-box i {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .feature-box h3 {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .feature-box span {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--accent);
            color: #000;
            padding: 18px 40px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(162, 155, 254, 0.3);
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(162, 155, 254, 0.4);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="badge">PUBLIC BETA</div>
        <h1>Nebula AI</h1>
        <p>The Ultimate Interview Assistant. Real-time guidance for the next generation of engineers.</p>

        <div class="features">
            <div class="feature-box">
                <i class="fas fa-brain"></i>
                <h3>Auto-Strategy</h3>
                <span>Smart Mode Switching</span>
            </div>
            <div class="feature-box">
                <i class="fas fa-bolt"></i>
                <h3>Zero Latency</h3>
                <span>Groq/Gemini Integration</span>
            </div>
            <div class="feature-box">
                <i class="fas fa-ghost"></i>
                <h3>Stealth Mode</h3>
                <span>Pure System Audio</span>
            </div>
        </div>

        <a href="/download" class="cta-btn" id="downloadBtn">
            <i class="fas fa-download"></i> Download Windows Beta
        </a>

        <div class="footer">
            Windows 10/11 • v25.9 BETA • Limited Early Access
        </div>
    </div>
</body>

</html>
